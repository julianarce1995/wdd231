    </header>
    <main>
      <h1>Join</h1>
      <div class="join-main">
        <form method="GET" action="thankyou.html" class="designOne">
          <div>
            <label for="first-name">First Name </label>
            <input
              id="first-name"
              type="text"
              required
              name="first"
              title="Your First Name"
              autocomplete="given-name"
              placeholder="Example: John"
            />
          </div>

          <div>
            <label for="last-name">Last Name </label>
            <input
              id="last-name"
              type="text"
              required
              name="last"
              title="Your Last Name"
              autocomplete="family-name"
              placeholder="Example: Doe"
            />
          </div>

          <div>
            <label for="organizational-title">Organizational Title </label>
            <input
              id="organizational-title"
              type="text"
              name="organizational-title"
              title="Your Organizational Title"
              autocomplete="organization-title"
              pattern="[A-Za-z\- ]{7,}"
              placeholder="Your Organizational Title"
            />
          </div>

          <div>
            <label for="email">Email </label>
            <input
              id="email"
              type="email"
              required
              name="email"
              autocomplete="email"
              title="Your Email"
              placeholder="john89@gmail.com"
            />
          </div>

          <div>
            <label for="phone">Phone </label>
            <input
              id="phone"
              type="tel"
              required
              name="phone"
              title="Your Phone Number"
              autocomplete="tel"
              placeholder="31245647"
            />
          </div>

          <div>
            <label for="company">Business / Organization's Name </label>
            <input
              id="company"
              type="text"
              required
              name="company"
              title="Your Company Name"
              autocomplete="organization"
              placeholder="Your Company Name"
            />
          </div>

          <div>
            <label for="membership-level">Membership level</label>
            <select name="membership-level" required id="membership-level">
              <option value="">Select Membership Level</option>
              <option value="NP">NP</option>
              <option value="Bronze">Bronze</option>
              <option value="Silver">Silver</option>
              <option value="Gold">Gold</option>
            </select>
          </div>

          <div>
            <label for="description">Description</label>
            <textarea
              id="description"
              title="Description"
              name="description"
              placeholder="Add a brief description."
            ></textarea>
          </div>

          <div>
            <input id="timestamp" type="hidden" name="timestamp" />
          </div>

          <div>
            <input type="submit" value="Schedule An Appointment" />
          </div>
        </form>
        <div id="cards" class="grid-cards"></div>
        <div>
          <dialog id="dialog" class="dialog"></dialog>
        </div>
      </div>
